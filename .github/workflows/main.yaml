name: Deploy Project to GKE

on:
  push:
   
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GKE_PROJECT }}

  GKE_CLUSTER: dwk-cluster
  GKE_ZONE: us-east1-b

  REGISTRY: us-east1-docker.pkg.dev
  REPOSITORY: kubernetes

  BRANCH: ${{ github.ref_name }}

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify authentication
        run: gcloud info

      - name: Configure Docker
        run: gcloud --quiet auth configure-docker $REGISTRY

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Form image names
        run: |
          echo "TODO_APP_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-app:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "TODO_BACKEND_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-backend:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "TODO_CRONJOB_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/todo-cronjob:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV
          echo "POSTGRES_BACKUP_IMAGE=$REGISTRY/$PROJECT_ID/$REPOSITORY/postgres-backup:$BRANCH-$GITHUB_SHA" >> $GITHUB_ENV

      - name: Build Todo App
        run: docker build -t $TODO_APP_IMAGE ./the_project/todo-app

      - name: Build Todo Backend
        run: docker build -t $TODO_BACKEND_IMAGE ./the_project/todo-backend

      - name: Build Todo CronJob
        run: docker build -t $TODO_CRONJOB_IMAGE ./the_project/todo-cronjob

      - name: Build Postgres Backup
        run: docker build -t $POSTGRES_BACKUP_IMAGE ./the_project/backup-cronjob

      - name: Show built images
        run: docker images

      - name: Push Todo App
        run: docker push $TODO_APP_IMAGE

      - name: Push Todo Backend
        run: docker push $TODO_BACKEND_IMAGE

      - name: Push Todo CronJob
        run: docker push $TODO_CRONJOB_IMAGE

      - name: Push Postgres Backup
        run: docker push $POSTGRES_BACKUP_IMAGE

      - name: Verify Gateway API
        run: |
          kubectl api-resources | grep gateway || true
          kubectl get gatewayclass || true

      - name: Deploy to GKE
        working-directory: ./the_project
        run: |

          if [ "$BRANCH" = "main" ]; then
            NAMESPACE="project"
          else
            NAMESPACE="$BRANCH"
          fi

          echo "Deploying to namespace: $NAMESPACE"

          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          kubectl config set-context --current --namespace=$NAMESPACE

          kustomize edit set namespace $NAMESPACE

          kustomize edit set image PROJECT/todo-app=$TODO_APP_IMAGE
          kustomize edit set image PROJECT/todo-backend=$TODO_BACKEND_IMAGE
          kustomize edit set image PROJECT/todo-cronjob=$TODO_CRONJOB_IMAGE
          kustomize edit set image PROJECT/postgres-backup=$POSTGRES_BACKUP_IMAGE

          kustomize build . | kubectl apply -f -

          kubectl rollout status deployment/todo-app-deployment -n $NAMESPACE --timeout=300s
          kubectl rollout status deployment/todo-backend-deployment -n $NAMESPACE --timeout=300s

          kubectl get pods -n $NAMESPACE
          kubectl get svc -n $NAMESPACE
          kubectl get gateway -n $NAMESPACE
          kubectl get httproute -n $NAMESPACE  