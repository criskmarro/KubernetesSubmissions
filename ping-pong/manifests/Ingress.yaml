apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: project-ingress

spec:

  rules:

  - http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: todo-app-service

            port:

              number: 80

      - path: /pingpong

        pathType: Prefix

        backend:

          service:

            name: ping-pong-service

            port:

              number: 80