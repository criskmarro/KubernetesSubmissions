apiVersion: gateway.networking.k8s.io/v1
kind: Gateway

metadata:
  namespace: exercises
  name: exercises-gateway

spec:
  gatewayClassName: eg

  listeners:

  - name: http
    protocol: HTTP
    port: 80

    allowedRoutes:

      namespaces:
        from: Same

---

apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller