apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-dep

spec:
  replicas: 1

  selector:
    matchLabels:
      app: log-output

  template:
    metadata:
      labels:
        app: log-output

    spec:
      volumes:
        - name: shared-log
          emptyDir: {}

      containers:
        - name: writer
          image: log-output-writer:v2

          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files

        - name: reader
          image: log-output-reader:v2

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files