apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: exercises
  name: log-output-dep

spec:
  replicas: 1

  selector:
    matchLabels:
      app: log-output

  template:
    metadata:
      labels:
        app: log-output

    spec:
      volumes:
        - name: shared-log
          emptyDir: {}

        - name: config-volume
          configMap:
            name: log-output-config

      containers:
        - name: writer
          image: us-east1-docker.pkg.dev/dwk-gke-502323/kubernetes/log-writer:GKE
        
          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files

        - name: reader
          image: us-east1-docker.pkg.dev/dwk-gke-502323/kubernetes/log-reader:GKE

          ports:
            - containerPort: 3000
            
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          env:
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: log-output-config
                  key: MESSAGE

          volumeMounts:
            - name: shared-log
              mountPath: /usr/src/app/files

            - name: config-volume
              mountPath: /usr/src/app/config