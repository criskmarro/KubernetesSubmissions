apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate

metadata:
  name: pingpong-cpu-analysis
  namespace: exercises

spec:
  metrics:

    - name: cpu-usage

      interval: 10s

      count: 3

      successCondition: result < 0.05

      provider:

        prometheus:

          address: http://prom-prometheus-server.monitoring.svc.cluster.local

          query: |
            scalar(
              sum(
                rate(
                  container_cpu_usage_seconds_total{
                    namespace="exercises",
                    container!="",
                    image!=""
                  }[5m]
                )
              )
            )