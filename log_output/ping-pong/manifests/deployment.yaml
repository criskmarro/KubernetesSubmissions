apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: exercises
  name: ping-pong-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ping-pong

  template:
    metadata:
      labels:
        app: ping-pong

    spec:
      containers:
      - name: ping-pong
        image: us-east1-docker.pkg.dev/dwk-gke-502323/kubernetes/ping-pong:GKE

        ports:
          - containerPort: 3001

        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10

        env:

        - name: POSTGRES_HOST
          value: postgres

        - name: POSTGRES_PORT
          value: "5432"

        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD