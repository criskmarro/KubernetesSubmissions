apiVersion: apps/v1
kind: Deployment

metadata:
  name: ping-pong-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ping-pong

  template:
    metadata:
      labels:
        app: ping-pong

    spec:

      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: ping-log-claim

      containers:
        - name: ping-pong

          image: ping-pong:v2
          imagePullPolicy: Never

          ports:
            - containerPort: 3001

          volumeMounts:
            - name: shared-storage
              mountPath: /usr/src/app/files