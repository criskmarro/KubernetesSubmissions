apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: exercises
  name: ping-pong-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ping-pong

  template:
    metadata:
      labels:
        app: ping-pong

    spec:
      containers:
      - name: ping-pong
        image: ping-pong:v2
        imagePullPolicy: Never
        ports:
          - containerPort: 3001