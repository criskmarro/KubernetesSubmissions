apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: project
  name: todo-backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: todo-backend

  template:
    metadata:
      labels:
        app: todo-backend

    spec:
      containers:

      - name: todo-backend

        image: PROJECT/todo-backend

        ports:

        - containerPort: 3000

        envFrom:

        - configMapRef:
            name: todo-backend-config

        - secretRef:
            name: todo-backend-secret