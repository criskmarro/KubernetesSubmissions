apiVersion: apps/v1
kind: Deployment

metadata:
  namespace: project
  name: todo-backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: todo-backend

  template:
    metadata:
      labels:
        app: todo-backend

    spec:
      containers:

      - name: todo-backend

        image: todo-backend
        imagePullPolicy: Never

        ports:

        - containerPort: 3000

        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        envFrom:

        - configMapRef:
            name: todo-backend-config

        - secretRef:
            name: todo-backend-secret
        
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "300m"
            memory: "256Mi"