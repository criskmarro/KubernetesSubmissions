apiVersion: apps/v1
kind: StatefulSet

metadata:
  namespace: project
  name: postgres

spec:
  serviceName: postgres-service

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:

      containers:

      - name: postgres

        image: postgres:16

        ports:

        - containerPort: 5432

        env:

        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: postgres-config
              key: POSTGRES_DB

        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_USER

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        volumeMounts:

        - name: postgres-data
          mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:

  - metadata:
      name: postgres-data

    spec:

      accessModes:
        - ReadWriteOnce

      storageClassName: local-path

      resources:

        requests:
          storage: 200Mi