apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      volumes:
        - name: image-storage
          persistentVolumeClaim:
            claimName: todo-images-claim
      containers:
        - name: todo-app
          image: todo-app:v3
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: image-storage
              mountPath: /usr/src/app/files